name: Deploy webapp

on: [push]

env:
  BRANCH_NAME: ${{ github.ref_name }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Repository Checkout
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      - name: Install Netlify
        run: npm install netlify-cli@20.1.1 -g

      - name: Install Dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy to Netlify
        id: netlify_deploy
        run: |
          prod_flag=""
          if [ "$BRANCH_NAME" = "main" ]; then prod_flag="--prod"; fi
          netlify deploy \
            --dir build \
            --site 2e697674-d6a3-48c2-bd59-a653cdbbf729 \
            --auth nfp_kf1fegC3jE25LdodiiveiHMZfBn8R6GL9d0a \
            $prod_flag